name: Code standardizer hook for PRs

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [develop]
  push:
    branches: [develop]

jobs:
  enforce-code-style:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '23.3.0'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      # If prettier or jshint fails, push or PR will be rejected
      - name: Commit and Push Changes with linting and auto-format
        if: success()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Intentar hacer commit
          git add .

          if git commit -m "🚀 Auto-format code and linting check"; then
            echo "✅ Commit successful, pushing and pipeline..."
            git push
          else
            COMMIT_STATUS=$?
            # if commit is empty we go out successfully
            if [ $COMMIT_STATUS -eq 1 ]; then
              echo "⚠️ Nothing to commit, continue pipelining"
              exit 0
            else
              echo "❌ Checks failed, aborting pipeline"
              exit 1
            fi
          fi
