name: 'Icestudio Windows'

# On-demand Windows x64 build.
#
# Triggered manually from the Actions tab (workflow_dispatch): pick the branch
# in the "Use workflow from" selector and it builds THAT branch, uploading the
# installer (.exe) + zip as workflow artifacts (no release/tag is created).
#
# wine/wine-mono are not needed: nw-builder sets the .exe icon/version info via
# resedit (pure JS) and makensis runs natively on Linux.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v5

      - name: Setup Nodejs version
        uses: actions/setup-node@v5
        with:
          node-version: '23.3.0'

      - name: Install npm dependencies
        run: npm install --legacy-peer-deps

      - name: Install NSIS
        run: |
          sudo add-apt-repository -y universe
          sudo apt-get update
          sudo apt-get install -y nsis

      - name: Build Microsoft Windows package
        run: npm run buildWindows

      - name: Install jq package
        run: sudo apt install -y jq

      # Read the icestudio version from package.json (version property)
      - id: icestudio_json
        run: |
          version=$(jq -r '.version' package.json)
          echo "icestudio_version=${version}" >> $GITHUB_OUTPUT

      # Timestamp for the build
      - id: build_date
        run: |
          timestamp=$(jq -r '.ts' app/buildinfo.json)
          echo "icestudio_timestamp=${timestamp}" >> $GITHUB_OUTPUT

      - name: 'Upload installer/win64'
        env:
          ICESTUDIO_VERSION: '${{steps.icestudio_json.outputs.icestudio_version}}'
          TIMESTAMP: '${{steps.build_date.outputs.icestudio_timestamp}}'
        uses: 'actions/upload-artifact@v5'
        with:
          name: 'win64_installer_${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}'
          path: 'dist/icestudio-${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}-win64.exe'
          if-no-files-found: error

      - name: 'Upload ZIP/win64'
        env:
          ICESTUDIO_VERSION: '${{steps.icestudio_json.outputs.icestudio_version}}'
          TIMESTAMP: '${{steps.build_date.outputs.icestudio_timestamp}}'
        uses: 'actions/upload-artifact@v5'
        with:
          name: 'win64_ZIP_${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}'
          path: 'dist/icestudio-${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}-win64.zip'
          if-no-files-found: error
