name: 'Icestudio OSX ARM64'

# On-demand macOS arm64 build.
#
# Triggered manually from the Actions tab (workflow_dispatch): pick the branch
# in the "Use workflow from" selector and it builds THAT branch, uploading the
# .dmg as a workflow artifact (no release/tag is created).
#
# Ad-hoc code signing (CODESIGN_ID=-, no Apple Developer certificate / secrets):
# the build's repair scripts ad-hoc sign the .app and the .dmg and set the .dmg
# Finder icon. Downloaded builds need
# `xattr -dr com.apple.quarantine /Applications/icestudio.app` on first launch.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Nodejs version
        uses: actions/setup-node@v5
        with:
          node-version: '23.3.0'

      - name: Install npm dependencies
        run: |
          # Merge macOS-only deps (grunt-appdmg, fs-xattr) into "dependencies"
          # so npm installs them. A plain rename would create a duplicate
          # "dependencies" key (package.json already has an empty one) and npm
          # keeps the last, empty one -> grunt-appdmg was never installed.
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.dependencies=Object.assign({},p.dependencies,p.darwinDependencies);delete p.darwinDependencies;fs.writeFileSync('package.json',JSON.stringify(p,null,2))"
          npm install --legacy-peer-deps

      - name: Build OSX ARM64 packages (ad-hoc signed)
        env:
          CODESIGN_ID: '-'
        run: |
          npm run buildOSXARM64
          ls dist/

      # Loading vars from icestudio package.json
      - id: icestudio_json
        run: |
          content=`tr '\n' ' ' < package.json`
          echo "packageJson=${content}" >> $GITHUB_OUTPUT

      # Timestamp for the build
      - id: build_date
        run: |
          content=`tr '\n' ' ' < app/buildinfo.json`
          echo "buildJson=${content}" >> $GITHUB_OUTPUT

      - name: 'Upload DMG/OSX64'
        env:
          ICESTUDIO_VERSION: '${{fromJson(steps.icestudio_json.outputs.packageJson).version}}'
          TIMESTAMP: '${{fromJson(steps.build_date.outputs.buildJson).ts}}'
        uses: actions/upload-artifact@v5
        with:
          name: 'osxarm64_DMG_${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}'
          path: 'dist/icestudio-${{env.ICESTUDIO_VERSION}}${{env.TIMESTAMP}}-osxarm64.dmg'
          if-no-files-found: error
