<div id="wiz-root" class="wiz-wrapper">
  <!-- Step progress indicator (dots injected by JS) -->
  <div class="wiz-progress" id="wiz-progress"></div>

  <!-- Step content (injected by JS) -->
  <div class="wiz-body" id="wiz-body"></div>

  <!-- Navigation footer -->
  <div class="wiz-footer">
    <button type="button" class="wiz-btn wiz-btn--ghost" id="wiz-cancel">
      Cancel
    </button>
    <div class="wiz-footer-right">
      <button
        type="button"
        class="wiz-btn wiz-btn--ghost wiz-hidden"
        id="wiz-back"
      >
        Back
      </button>
      <button type="button" class="wiz-btn wiz-btn--primary" id="wiz-next">
        Continue
      </button>
    </div>
  </div>
</div>
