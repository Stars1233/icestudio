<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/system.js" defer></script>
  </head>
  <body>
    <!-- Floating copy button (top-right) -->
    <button id="si-copy" type="button" title="Copy to clipboard">
      <svg
        viewBox="0 0 24 24"
        width="15"
        height="15"
        fill="none"
        stroke="currentColor"
        stroke-width="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
      >
        <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
        <path
          d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
        ></path>
      </svg>
      <span id="si-copy-label">Copy</span>
    </button>

    <h1 id="si-title">System information</h1>
    <main id="si-report"></main>

    <p id="si-note">
      Paths are anonymized — your username is shown as
      <code>&lt;user&gt;</code>, so this is safe to share in a bug report.
    </p>
  </body>
</html>
