  <!-- INDEX HTML FILE --- Initial ENTRY POINT                           -->
  <!----------------------------------------------------------------------->
  <!-- Start sequence:                                                   -->
  <!--   * NW is executed. Icestudio is a NWjs application.              -->
  <!--   * NW creates the main display window (a browser)                -->
  <!--   * NW loads this file into the window (index.html)               -->
  <!--   * index.html is processed and executed                          -->
  <!----------------------------------------------------------------------->
  <!-- index.html structure:                                             -->
  <!--   * CSS is loaded (for both internal and external dependencies)   -->
  <!--   * JS files are loaded (both internal and external JS files)     -->
  <!--   * The body contains the structure of the Icestudio GUI          -->
  <!----------------------------------------------------------------------->
  <!-- When the JS files are executed, there is already a nw window      -->
  <!--   available                                                       -->
  <!-- All the JS files have access to the nw object (which gives access -->
  <!--   to the nw API)                                                  -->
  <!----------------------------------------------------------------------->

  <!--   Icestudio depends on many .js files. The main JS file, which is -->
  <!--   initially executed, is app.js.                                  -->
  <!-- If you want to understand the Icestudio code, first have a look   -->
  <!--   at this index.html and then continue with app.js                -->

  <!-- NW documentation:                                                 -->

  <!-- "angular": "~1.6.9"              ==>    angular                   -->
  <!-- "angular-gettext": "2.4.2"       ==>    angular-gettext           -->

  <head>
    <title>Icestudio</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />

    <!-- critical CSS, should be loaded as soon as possible -->
    <style>
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      /* Anti-FOUC: paint the splash blue from the very first frame and keep the
         body hidden until EVERY <head> stylesheet has loaded. The inline script
         at the end of <head> adds the `css-ready` class, and the browser only
         runs that script once the preceding stylesheets are parsed — so on slow
         machines (mostly Windows) the unstyled HTML is never shown before the
         CSS is ready. */
      html {
        background-color: #305eac;
      }
      html:not(.css-ready) body {
        visibility: hidden;
      }
      /* -- Splash screen  */
      #main-icestudio-load-wrapper {
        position: absolute;
        top: 0;
        left: 0;
        z-index: 9999999999999999;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        background-color: #305eac;
        opacity: 1;
        transition: opacity 1s ease;
      }

      /* Background splash image. The actual image + author credit are set at
         runtime from resources/images/splash/splash.json (configurable). */
      #splash-bg {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 100px; /* leave room for the bottom blue band */
        background-color: #305eac;
        background-position: center;
        background-size: cover;
        background-repeat: no-repeat;
      }

      /* Author credit (free images), small text, top-right over the image */
      #splash-credits {
        position: absolute;
        top: 10px;
        right: 16px;
        z-index: 3;
        font-family: 'Roboto', 'Helvetica Neue', Arial, sans-serif;
        font-size: 11px;
        line-height: 1.4;
        color: rgba(255, 255, 255, 0.9);
        text-decoration: none;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.7);
      }
      #splash-credits:hover {
        text-decoration: underline;
        color: #fff;
      }

      /* Bottom blue band (100px) with the icestudio logo on the right */
      #splash-band {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 100px;
        background-color: #305eac;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 44px;
        box-sizing: border-box;
      }
      #splash-logo-icestudio {
        height: 80px;
      }
      #splash-logo-fpgawars {
        height: 64px;
      }

      /* Thin loading progress line sitting on top of the bottom band */
      #main-icestudio-load-wrapper--bar {
        position: absolute;
        bottom: 100px;
        left: 0;
        width: 0;
        height: 4px;
        z-index: 2;
        animation: progres 3s infinite linear;
        background-color: #fff;
      }

      @keyframes progres {
        0% {
          width: 0%;
        }

        25% {
          width: 50%;
        }

        50% {
          width: 75%;
        }

        75% {
          width: 85%;
        }

        100% {
          width: 100%;
        }
      }

      #main-icestudio-load-wrapper.fade-loaded {
        opacity: 0;
      }

      #main-icestudio-load-wrapper.loaded {
        display: none;
      }

      #main-icestudio-wrapper {
        position: relative;
        display: block;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      /*
#main-icestudio-wrapper.loaded {
    display: block;
}*/

      .spinner-wrapper {
        width: 100%;
        height: 100vh;
        position: fixed;
        overflow: hidden;
        top: 0;
        left: 0;
        z-index: 9999;
        display: none;
      }
      /*body.waiting */
      .spinner-wrapper.waiting {
        display: block;
      }
      .spinner-wrapper--bg {
        width: 100%;
        height: 100vh;
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
        z-index: 0;
        background-color: #7ccff4;
        opacity: 0.4;
      }
      .spinner-wrapper--container {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        margin: auto;
        width: 80px;
        height: 80px;
        z-index: 1;
      }
    </style>

    <!-- Anti-FOUC reveal: this inline script is parser-blocking and, because it
         follows the stylesheets above, the browser delays running it until all
         of them have loaded/parsed. Marking <html> as `css-ready` here (before
         the body is even parsed) means the body is only ever rendered with the

    <!------------------------------------------------------->
    <!-- Initial load screen                               -->
    <!-- It is shown every time a new Icestudio window     -->
    <!-- is open (including the initial one)               -->
    <!------------------------------------------------------->
    <div id="main-icestudio-load-wrapper">
      <!-- Background image + author credit are filled at runtime from
           resources/images/splash/splash.json (see the inline script below). -->
      <div id="splash-bg"></div>
      <a id="splash-credits" href="#" target="_blank" rel="noopener"></a>
      <div id="main-icestudio-load-wrapper--bar"></div>
      <!-- Bottom blue band: icestudio + FPGAwars logos on the right -->
      <div id="splash-band">
        <img
          id="splash-logo-icestudio"
          src="resources/images/icestudio-github.svg"
          alt="Icestudio"
        />
        <img
          id="splash-logo-fpgawars"
          src="resources/images/fpgawars-logo.png"
          alt="FPGA wars"
        />
      </div>
    </div>

    <!-- Configurable splash: read the image + credit metadata and apply them.
         To change the splash, edit resources/images/splash/splash.json (image
         filename, author, link, source) and drop the new free image alongside
         it. -->
    <script>
      (function () {
        function applySplash(meta) {
          try {
            if (meta && meta.image) {
              var bg = document.getElementById('splash-bg');
              if (bg) {
                bg.style.backgroundImage =
                  "url('resources/images/splash/" + meta.image + "')";
              }
            }
            var credits = document.getElementById('splash-credits');
            if (credits && meta && meta.author && meta.link) {
              credits.textContent =
                meta.author + (meta.source ? ' · ' + meta.source : '');
              credits.href = meta.link;
            }
          } catch (e) {
            /* keep the plain blue band on any error */
          }
        }
        fetch('resources/images/splash/splash.json')
          .then(function (r) {
            return r.json();
          })
          .then(applySplash)
          .catch(function () {});
      })();
    </script>
